<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test - Galactic Explorer 2D Health Check</title>
  <style>
    body{margin:0;background:#111;color:#9ff;font-family:Inter, system-ui, sans-serif;}
    .wrap{padding:16px;max-width:800px;margin:0 auto}
    canvas{width:100%;height:auto;background:#000;border:1px solid #555;border-radius:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="color:#0ff; text-align:center;">Galactic Explorer 2D Health Check</h2>
    <canvas id="healthCanvas" width="640" height="360"></canvas>
  </div>
  <script>
    const c=document.getElementById('healthCanvas');
    const ctx=c.getContext('2d');
    let x=20,y=320,vx=2,vy=0,g=0.6; function loop(){ vy+=g; y+=vy; x+=vx; if(y+20>360){ y=360-20; vy=0; }
      ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='#0ff'; ctx.fillRect(x,y,20,20);
      requestAnimationFrame(loop);
    } loop();
  </script>
</body>
</html>
