<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galactic Explorer 2D Demo</title>
  <style>
    :root{--bg:#000;--fg:#0ff;--panel:#111;--text:#9ff}
    html,body{margin:0;height:100%;}
    body{background:#000;color:#0ff;font-family:Inter, system-ui, sans-serif;}
    .wrap{width:100%;max-width:820px;margin:0 auto;padding:16px;}
    .panel{display:flex;gap:12px;justify-content:space-between;align-items:center;margin:8px 0;color:#88f}
    canvas{border:1px solid #555;background:#111;width:100%;height:auto;border-radius:12px}
    .hud{position:relative;display:flex;justify-content:space-between;gap:12px;margin-top:6px}
    .badge{background:#111;border:1px solid #333;border-radius:8px;padding:6px 10px;font-size:12px;color:#9be}
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="color:#0ff;text-align:center">Galactic Explorer 2D Demo</h2>
    <div class="board">
      <canvas id="c" width="640" height="360"></canvas>
      <div class="hud" aria-label="HUD">
        <div class="badge" id="hudInfo">Speed: 0 • Jump: ready</div>
        <button class="badge" onclick="resetGame()">Reset</button>
      </div>
    </div>
  </div>
  <script>
    const c=document.getElementById('c');
    const ctx=c.getContext('2d');
    let x=60,y=260,vx=0,vy=0,g=0.6; const w=60,h=80; let onGround=false; let startTime=Date.now();
    function resetGame(){ x=60;y=260;vx=0;vy=0;onGround=false; }
    function loop(){
      vy+=g; y+=vy; x+=vx;
      if(y+20>360){ y=360-20; vy=0; onGround=true; }
      ctx.clearRect(0,0,c.width,c.height);
      // ground
      ctx.fillStyle='#033'; ctx.fillRect(0,340,640,20);
      ctx.fillStyle="#0ff"; ctx.fillRect(x,y,w,h);
      // hud
      const speed = Math.abs(vx).toFixed(1);
      document.getElementById('hudInfo').textContent = `Speed: ${speed}  Jump: ${onGround? 'ready':'in flight'}`;
      requestAnimationFrame(loop);
    }
    window.addEventListener('keydown',e=>{ if(e.code==='ArrowLeft' || e.code==='KeyA') vx=-4; if(e.code==='ArrowRight' || e.code==='KeyD') vx=4; if((e.code==='Space' || e.code==='ArrowUp') && onGround){ vy=-12; onGround=false; }});
    window.addEventListener('keyup',e=>{ if(e.code==='ArrowLeft' || e.code==='KeyA' || e.code==='ArrowRight' || e.code==='KeyD') vx=0;});
    loop();
  </script>
</body>
</html>
