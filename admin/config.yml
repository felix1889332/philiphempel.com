backend:
  name: github
  repo: felix1889332/philiphempel.com
  branch: main

media_folder: "assets/media"
public_folder: "/media"

 Collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "index.md"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "body", label: "Body", widget: "markdown" }